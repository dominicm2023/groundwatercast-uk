<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GroundwaterCast">
  <defs>
    <clipPath id="gwc-drop">
      <path d="M16 2.5 C16 2.5 25.5 13.5 25.5 21 A9.5 9.5 0 1 1 6.5 21 C6.5 13.5 16 2.5 16 2.5 Z"/>
    </clipPath>
  </defs>
  <!-- droplet, split at the water-table line: light above, water below -->
  <g clip-path="url(#gwc-drop)">
    <rect x="0" y="0" width="32" height="32" fill="#86bce8"/>
    <rect x="0" y="18" width="32" height="14" fill="#1f77b4"/>
    <line x1="0" y1="18" x2="32" y2="18" stroke="#ffffff" stroke-width="1.5"/>
  </g>
  <!-- subtle outline (defines the shape on light tab; invisible-ish on dark header) -->
  <path d="M16 2.5 C16 2.5 25.5 13.5 25.5 21 A9.5 9.5 0 1 1 6.5 21 C6.5 13.5 16 2.5 16 2.5 Z"
        fill="none" stroke="#1a3a5c" stroke-width="1.4" stroke-opacity="0.45"/>
</svg>
